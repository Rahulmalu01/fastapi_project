{% extends "base.html" %}

{% block title %}New Post · FastAPI Blog{% endblock %}

{% block content %}
    <section class="auth-panel">
        <h2>Create a New Post</h2>
        <form action="/new" method="post" class="auth-form">
            <label>
                Title
                <input type="text" name="title" placeholder="Write a headline for your post" required>
            </label>
            <label>
                Content
                <textarea name="body" placeholder="Share your thoughts..." required></textarea>
            </label>
            <button type="submit">Publish Post</button>
        </form>
    </section>
{% endblock %}
