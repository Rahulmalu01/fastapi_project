{% extends "base.html" %}

{% block title %}Edit Post · FastAPI Blog{% endblock %}

{% block content %}
    <section class="auth-panel">
        <h2>Edit Post</h2>
        <form action="/post/{{ post.id }}/edit" method="post" class="auth-form">
            <label>
                Title
                <input type="text" name="title" value="{{ post.title }}" required>
            </label>
            <label>
                Content
                <textarea name="body" required>{{ post.body }}</textarea>
            </label>
            <button type="submit">Save changes</button>
        </form>
    </section>
{% endblock %}
